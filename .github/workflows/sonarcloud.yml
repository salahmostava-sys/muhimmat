name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate frontend-only package management
        run: |
          for file in package.json package-lock.json bun.lock bun.lockb; do
            if [ -f "$file" ]; then
              echo "Root-level $file is not allowed. Use frontend/ package files only."
              exit 1
            fi
          done

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud skipped (missing SONAR_TOKEN)
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN is not configured in repository secrets. Skipping SonarCloud scan."
